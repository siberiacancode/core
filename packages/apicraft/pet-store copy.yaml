openapi: 3.0.0
info:
  title: Minimal API
  version: 1.0.0
paths:
  /users:
    get:
      summary: Get user
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
components:
  schemas:
    User:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
      required:
        - id
        - name