openapi: 3.0.3
info:
  title: Auth Service (Simple Flow)
  version: 1.2.0
  description: |
    Redirect flow с authorization code:
    1) Клиент открывает GET /login?return_to=<callback>
    2) POST /login проверяет логин/пароль и редиректит на return_to?code=...
    3) Клиент обменивает code на токены через POST /token
    4) Для новых пользователей пароль задается через /setup-password?token=...
servers:
  - url: http://localhost:4000
tags:
  - name: Auth
    description: Публичные методы аутентификации (HTML страницы / выдача токенов).
  - name: Technical
    description: Технические/интеграционные методы (JWKS, internal API).
paths:
  /health:
    get:
      tags: [Technical]
      summary: Healthcheck
      responses:
        "200":
          description: Service alive
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
              example:
                ok: true

  /login:
    get:
      tags: [Auth]
      summary: Страница входа (HTML)
      parameters:
        - in: query
          name: return_to
          required: false
          schema:
            type: string
            format: uri
      responses:
        "200":
          description: HTML login page
          content:
            text/html:
              schema:
                type: string
        "default":
          description: safsdf
          content:
            text/html:
              schema:
                type: string
        "300":
          description: HTML login page
          content:
            text/html:
              schema:
                type: string
        # "400":
        #   description: HTML login page
        #   content:
        #     text/html:
        #       schema:
        #         type: string
        # "500":
        #   description: HTML login page
        #   content:
        #     text/html:
        #       schema:
        #         type: string
    post:
      tags: [Auth]
      summary: Проверка логина/пароля и redirect на return_to с code
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required: [username, password, return_to]
              properties:
                username:
                  type: string
                password:
                  type: string
                return_to:
                  type: string
                  format: uri
      responses:
        "302":
          description: Redirect to return_to with code
        "403":
          description: Пользователь заблокирован или требуется первичная установка пароля
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/PasswordSetupRequiredError"
                  - $ref: "#/components/schemas/SimpleError"
        "400":
          description: Невалидный ввод
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SimpleError"

  /token:
    post:
      tags: [Auth]
      summary: Обмен authorization_code на токены или refresh
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              oneOf:
                - $ref: "#/components/schemas/AuthCodeRequest"
                - $ref: "#/components/schemas/RefreshTokenRequest"
      responses:
        "200":
          description: Tokens issued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenResponse"
        "400":
          description: OAuth-like error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OAuthError"

  /setup-password:
    get:
      tags: [Auth]
      summary: Страница первичной установки пароля
      parameters:
        - in: query
          name: token
          required: true
          schema:
            type: string
      responses:
        "200":
          description: HTML page
          content:
            text/html:
              schema:
                type: string
        "400":
          description: Token invalid or expired
          content:
            text/html:
              schema:
                type: string
    post:
      tags: [Auth]
      summary: Установка пароля по одноразовому token
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required: [token, password, passwordRepeat]
              properties:
                token:
                  type: string
                password:
                  type: string
                  minLength: 6
                passwordRepeat:
                  type: string
      responses:
        "200":
          description: Password set
          content:
            text/html:
              schema:
                type: string
        "400":
          description: Validation or token error
          content:
            text/html:
              schema:
                type: string

  /logout:
    post:
      tags: [Auth]
      summary: Logout session
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
              example:
                ok: true

  /jwks:
    get:
      tags: [Technical]
      summary: Public JWKS for backend token verification
      responses:
        "200":
          description: Public keys
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JwksResponse"
              example:
                keys:
                  - kty: RSA
                    kid: auth-default
                    use: sig
                    alg: RS256
                    n: "<base64url>"
                    e: AQAB

  /internal/users:
    post:
      tags: [Technical]
      summary: Internal create user in auth (without password)
      security:
        - internalToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username]
              properties:
                username:
                  type: string
      responses:
        "201":
          description: Auth user created, password setup link issued
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  username:
                    type: string
                  setupUrl:
                    type: string
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SimpleError"
        "401":
          description: Invalid internal token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SimpleError"
        "409":
          description: Username already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SimpleError"

components:
  securitySchemes:
    internalToken:
      type: apiKey
      in: header
      name: x-internal-token
      description: |
        Внутренний токен для интеграций (например, Users -> Auth при создании пользователя).
  schemas:
    OAuthError:
      type: object
      description: Ошибка в OAuth-like формате (используется в `/token`).
      required: [error]
      properties:
        error:
          type: string
          description: |
            Код ошибки. Обычно:
            - `invalid_request` — не хватает обязательных полей
            - `invalid_grant` — неверный/просроченный code или refresh token
            - `unsupported_grant_type` — неизвестный grant_type
          example: invalid_grant
        error_description:
          type: string
          description: Человекочитаемое пояснение (может отсутствовать).
          example: code обязателен
    SimpleError:
      type: object
      description: |
        Простой JSON-формат ошибки: `{ "error": "..." }`.
      required: [error]
      properties:
        error:
          type: string
          example: unauthorized
    PasswordSetupRequiredError:
      type: object
      description: |
        Ошибка логина, когда у пользователя ещё не установлен пароль.

        Фронту нужно показать пользователю ссылку `setupUrl` (если пришла) и предложить установить пароль.
      required: [error, message]
      properties:
        error:
          type: string
          enum: [password_setup_required]
          description: Машинный код ошибки.
        message:
          type: string
          example: сначала подтвердите пароль
          description: Пояснение для пользователя.
        setupUrl:
          type: string
          nullable: true
          description: URL страницы установки пароля (может отсутствовать).
          example: "http://localhost:4000/setup-password?token=..."
    RefreshTokenRequest:
      type: object
      description: Запрос обновления токенов по refresh token.
      required: [grant_type, refresh_token]
      properties:
        grant_type:
          type: string
          enum: [refresh_token]
          description: Тип гранта.
        refresh_token:
          type: string
          description: Refresh token (opaque строка).
          example: "c9Vv4F... (48 chars)"
    AuthCodeRequest:
      type: object
      description: Запрос обмена authorization code на токены.
      required: [grant_type, code]
      properties:
        grant_type:
          type: string
          enum: [authorization_code]
          description: Тип гранта.
        code:
          type: string
          description: Authorization code, полученный из редиректа `/login`.
          example: "SOME_AUTH_CODE"
    TokenResponse:
      type: object
      description: |
        Ответ с access/refresh токенами.

        `access_token` — JWT (RS256). Внутри:
        - `sub` = `user.id` (из Users Service)
        - `roles` = роли пользователя
        - `iss` = `ISSUER`
      required: [token_type, access_token, refresh_token, expires_in, scope]
      properties:
        token_type:
          type: string
          example: Bearer
          description: Тип токена для заголовка Authorization.
        access_token:
          type: string
          description: JWT access token.
        refresh_token:
          type: string
          description: Refresh token (хранить безопасно, не логировать).
        expires_in:
          type: integer
          description: Время жизни access token в секундах.
          example: 900
        scope:
          type: string
          description: Scope строкой (через пробел).
          example: "profile roles"
    JwksResponse:
      type: object
      description: Public JWKS (набор публичных ключей) для проверки JWT другими сервисами.
      required: [keys]
      properties:
        keys:
          type: array
          items:
            type: object
            additionalProperties: true
